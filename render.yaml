services:
  - type: web
    name: social-media-manager-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run api:build
    startCommand: npm --workspace apps/api run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: social-media-manager-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: social-media-manager-queue
          type: keyvalue
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: STORAGE_DRIVER
        value: minio
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        sync: false
      - key: MINIO_USE_SSL
        value: "true"
      - key: MEDIA_RETENTION_DAYS
        value: "15"

  - type: keyvalue
    name: social-media-manager-queue
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: social-media-manager-db
    plan: free
    region: oregon
